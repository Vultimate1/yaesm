name: run-tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Update system packages
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y
      - name: Install dependencies
        run: |
          sudo apt-get install -y python3 python3-venv btrfs-progs zfsutils-linux openssh-client openssh-server
      - name: Start SSH server
        run: |
          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd
      - name: Create virtual environment
        run: |
          sudo python3 -m venv yaesm-venv
      - name: Activate and run pytest environment
        run: |
          sudo yaesm-venv/bin/pip3 install -e .[test]
          sudo yaesm-venv/bin/python3 -m pytest
