name: run-tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
      options: --user root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Update system packages
        run: |
          apt-get update -y
          apt-get upgrade -y
      - name: Install dependencies
        run: |
          apt-get install -y python3 python3-venv btrfs-progs zfsutils-linux
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >~/.ssh/known_hosts 2>/dev/null
          chmod 0600 ~/.ssh/known_hosts
      - name: Create virtual environment
        run: |
          python3 -m venv yaesm-venv
      - name: Activate and run pytest environment
        run: |
          source yaesm-venv/bin/activate
          pip3 install -e .[test]
          python3 -m pytest
