name: run-tests
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/run-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/run-tests.yml'

defaults:
  run:
    shell: sudo bash {0}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y python3 python3-venv btrfs-progs zfsutils-linux openssh-client openssh-server
      - name: Install python dependencies into venv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip3 install -e .[test]
      - name: Start SSH server
        run: |
          mkdir -p /run/sshd /root/.ssh
          /usr/sbin/sshd
          ssh-keyscan -H localhost >> /root/.ssh/known_hosts
          chmod 600 /root/.ssh/known_hosts
      - name: Run tests
        run: |
          source .venv/bin/activate
          python3 -m pytest
